<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌾 Farmer Dashboard</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,sans-serif}
        body{background:linear-gradient(135deg,#0a3d1f,#14694a,#1e8a5a);min-height:100vh;padding:10px}

        .topbar{background:rgba(255,255,255,0.12);border-radius:14px;padding:10px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(10px);flex-wrap:wrap;gap:8px}
        .topbar-left h1{color:#fff;font-size:1.2rem}
        .topbar-left p{color:#a8e6cf;font-size:0.72rem;margin-top:2px}
        .topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .user-info{background:rgba(255,255,255,0.15);padding:6px 14px;border-radius:22px;color:white;font-size:0.78rem;cursor:pointer;display:flex;align-items:center;gap:5px}
        .user-info strong{color:#a8e6cf}
        .sync-badge{padding:4px 12px;border-radius:15px;font-size:0.68rem;font-weight:700}
        .sync-on{background:#4CAF50;color:white}
        .sync-off{background:#FF9800;color:white}
        .btn-logout{padding:6px 14px;border:1.5px solid rgba(255,255,255,0.3);background:transparent;color:white;border-radius:22px;cursor:pointer;font-weight:600;font-size:0.78rem;transition:all 0.3s}
        .btn-logout:hover{background:rgba(255,255,255,0.2)}

        .stats{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
        .sc{flex:1;min-width:110px;background:rgba(255,255,255,0.95);border-radius:10px;padding:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.1);transition:transform 0.3s}
        .sc:hover{transform:translateY(-2px)}
        .sc .n{font-size:1.4rem;font-weight:bold;color:#0a3d1f}
        .sc .l{color:#666;font-size:0.68rem;margin-top:2px}
        .sc.c1{border-top:3px solid #2196F3}.sc.c2{border-top:3px solid #4CAF50}.sc.c3{border-top:3px solid #f44336}.sc.c4{border-top:3px solid #FF9800}

        .ctrls{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
        .sbox{display:flex;gap:5px;flex-wrap:wrap}
        .sbox input,.sbox select{padding:8px 12px;border:2px solid #ddd;border-radius:20px;font-size:0.82rem;outline:none;background:white}
        .sbox input:focus,.sbox select:focus{border-color:#4CAF50}
        .bgrp{display:flex;gap:5px;flex-wrap:wrap}

        .btn{padding:8px 16px;border:none;border-radius:20px;font-size:0.78rem;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:4px;transition:all 0.3s;white-space:nowrap}
        .btn:hover{transform:translateY(-1px)}.btn:active{transform:scale(0.96)}
        .ba{background:linear-gradient(135deg,#4CAF50,#388E3C);color:white;box-shadow:0 2px 8px rgba(76,175,80,0.4)}
        .be{background:linear-gradient(135deg,#217346,#185C37);color:white}
        .bb{background:linear-gradient(135deg,#FF9800,#F57C00);color:white}
        .bd{background:linear-gradient(135deg,#9C27B0,#7B1FA2);color:white}
        .bp{background:linear-gradient(135deg,#607D8B,#455A64);color:white}
        .sm{padding:4px 9px;font-size:0.68rem;border-radius:12px}
        .sv{background:#2196F3;color:white}.sed{background:#FF9800;color:white}.sdl{background:#f44336;color:white}
        .scancel{background:#e0e0e0;color:#555}.ssave{background:linear-gradient(135deg,#4CAF50,#388E3C);color:white}

        .tbox{background:white;border-radius:12px;overflow:hidden;box-shadow:0 6px 25px rgba(0,0,0,0.2)}
        .twrap{overflow-x:auto}
        table{width:100%;border-collapse:collapse;min-width:1150px}
        thead{background:linear-gradient(135deg,#0a3d1f,#1e8a5a)}
        thead th{padding:11px 7px;color:white;text-align:left;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.3px;white-space:nowrap}
        tbody tr{border-bottom:1px solid #f0f0f0;transition:background 0.2s}
        tbody tr:hover{background:#eeffee}
        tbody tr:nth-child(even){background:#fafafa}
        tbody td{padding:8px 7px;font-size:0.78rem;color:#333;white-space:nowrap}
        .bdg{padding:2px 10px;border-radius:15px;font-size:0.65rem;font-weight:600;text-transform:uppercase}
        .b1{background:#e8f5e9;color:#2e7d32}.b2{background:#ffebee;color:#c62828}.b3{background:#fff3e0;color:#e65100}
        .acts{display:flex;gap:2px}

        .pg{display:flex;justify-content:center;padding:12px;gap:3px;flex-wrap:wrap}
        .pg button{padding:5px 10px;border:1.5px solid #e0e0e0;background:white;border-radius:6px;cursor:pointer;font-weight:600;font-size:0.75rem}
        .pg button:hover,.pg button.act{background:#4CAF50;color:white;border-color:#4CAF50}
        .pg button:disabled{opacity:0.4;cursor:not-allowed}
        .nodata{text-align:center;padding:30px;color:#999}.nodata span{font-size:2rem;display:block;margin-bottom:6px}

        .ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
        .ov.on{display:flex}
        .mdl{background:white;border-radius:16px;width:92%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 15px 40px rgba(0,0,0,0.3);animation:mIn 0.25s ease}
        @keyframes mIn{from{transform:translateY(25px);opacity:0}to{transform:translateY(0);opacity:1}}
        .mhd{background:linear-gradient(135deg,#0a3d1f,#1e8a5a);color:white;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-radius:16px 16px 0 0}
        .mhd h2{font-size:1.05rem}
        .cbtn{background:rgba(255,255,255,0.2);border:none;color:white;font-size:1.1rem;cursor:pointer;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center}
        .cbtn:hover{background:rgba(255,255,255,0.4)}
        .mbd{padding:16px}.mft{padding:8px 16px 16px;display:flex;justify-content:flex-end;gap:6px}

        .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
        .fg{display:flex;flex-direction:column}.fg.fw{grid-column:1/-1}
        .fg label{font-size:0.75rem;color:#555;margin-bottom:3px;font-weight:600}.fg .rq{color:#f44336}
        .fg input,.fg select,.fg textarea{padding:8px 11px;border:2px solid #e0e0e0;border-radius:8px;font-size:0.85rem;outline:none;transition:all 0.3s}
        .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#4CAF50;box-shadow:0 0 0 3px rgba(76,175,80,0.1)}
        .fg textarea{resize:vertical;min-height:50px}

        .vgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .vi{padding:9px;background:#f8f9fa;border-radius:8px;border-left:3px solid #4CAF50}
        .vi.fw{grid-column:1/-1}
        .vi label{font-size:0.65rem;color:#888;text-transform:uppercase;letter-spacing:0.3px}
        .vi p{font-size:0.85rem;color:#333;font-weight:600;margin-top:2px;word-break:break-all}

        .profile-card{text-align:center;padding:15px}
        .profile-avatar{width:65px;height:65px;background:linear-gradient(135deg,#4CAF50,#388E3C);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:1.8rem;color:white}
        .profile-card h3{font-size:1.1rem;color:#333;margin-bottom:4px}
        .profile-card p{color:#888;font-size:0.82rem}

        .toast{position:fixed;top:10px;right:10px;padding:11px 16px;border-radius:9px;color:white;font-weight:600;z-index:3000;animation:tIn 0.3s ease;box-shadow:0 3px 10px rgba(0,0,0,0.2);max-width:300px;font-size:0.8rem}
        .ts{background:#4CAF50}.te{background:#f44336}.tw{background:#2196F3}
        @keyframes tIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}

        @media(max-width:768px){.topbar{flex-direction:column;text-align:center}.fgrid,.vgrid{grid-template-columns:1fr}.stats{flex-direction:column}.ctrls{flex-direction:column;align-items:stretch}.sbox,.bgrp{flex-direction:column}.topbar-right{justify-content:center}}
        @media print{body{background:white;padding:3px}.topbar,.ctrls,.acts,.pg,.bgrp,.stats,.btn,.sync-badge{display:none!important}.tbox{box-shadow:none}}
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <h1>🌾 Farmer Database</h1>
        <p>किसान डेटाबेस प्रबंधन</p>
    </div>
    <div class="topbar-right">
        <span class="sync-badge sync-off" id="syncBadge">⏳ Connecting...</span>
        <div class="user-info" onclick="showProfile()">👤 <strong id="userName">User</strong></div>
        <button class="btn-logout" onclick="logout()">🚪 Logout</button>
    </div>
</div>

<div class="stats">
    <div class="sc c1"><div class="n" id="sT">0</div><div class="l">📊 Total</div></div>
    <div class="sc c2"><div class="n" id="sA">0</div><div class="l">✅ Active</div></div>
    <div class="sc c3"><div class="n" id="sI">0</div><div class="l">❌ Inactive</div></div>
    <div class="sc c4"><div class="n" id="sP">0</div><div class="l">⏳ Pending</div></div>
</div>

<div class="ctrls">
    <div class="sbox">
        <input type="text" id="search" placeholder="🔍 Search..." oninput="render()">
        <select id="filter" onchange="render()"><option value="all">All</option><option value="Active">✅ Active</option><option value="Inactive">❌ Inactive</option><option value="Pending">⏳ Pending</option></select>
    </div>
    <div class="bgrp">
        <button class="btn ba" onclick="openAdd()">➕ Add</button>
        <button class="btn be" onclick="exportCSV()">📗 Excel</button>
        <button class="btn bb" onclick="backup()">💾 Backup</button>
        <button class="btn bd" onclick="restore()">📥 Restore</button>
        <button class="btn bp" onclick="window.print()">🖨️</button>
    </div>
</div>

<div class="tbox">
    <div class="twrap">
        <table><thead><tr><th>S.No.</th><th>Code</th><th>Name</th><th>Aadhar</th><th>Address</th><th>Bank</th><th>A/C</th><th>IFSC</th><th>Branch</th><th>Mobile</th><th>Status</th><th>Action</th></tr></thead><tbody id="tb"></tbody></table>
    </div>
    <div class="pg" id="pgn"></div>
</div>

<!-- Modals -->
<div class="ov" id="fMdl"><div class="mdl"><div class="mhd"><h2 id="mT">➕ Add Farmer</h2><button class="cbtn" onclick="cF()">&times;</button></div><div class="mbd"><input type="hidden" id="eI" value="-1"><div class="fgrid"><div class="fg"><label>Farmer Code <span class="rq">*</span></label><input id="i1" placeholder="FR-001"></div><div class="fg"><label>Name <span class="rq">*</span></label><input id="i2" placeholder="Name"></div><div class="fg"><label>Aadhar <span class="rq">*</span></label><input id="i3" placeholder="XXXX-XXXX-XXXX" maxlength="14" oninput="fmtA(this)"></div><div class="fg"><label>Mobile <span class="rq">*</span></label><input id="i4" placeholder="10 digits" maxlength="10" oninput="this.value=this.value.replace(/\D/g,'')"></div><div class="fg fw"><label>Address <span class="rq">*</span></label><textarea id="i5" placeholder="Address"></textarea></div><div class="fg"><label>Bank <span class="rq">*</span></label><input id="i6" placeholder="Bank"></div><div class="fg"><label>A/C <span class="rq">*</span></label><input id="i7" placeholder="A/C No."></div><div class="fg"><label>IFSC <span class="rq">*</span></label><input id="i8" placeholder="IFSC" style="text-transform:uppercase"></div><div class="fg"><label>Branch</label><input id="i9" placeholder="Branch"></div><div class="fg"><label>Status <span class="rq">*</span></label><select id="i10"><option value="Active">✅ Active</option><option value="Pending">⏳ Pending</option><option value="Inactive">❌ Inactive</option></select></div></div></div><div class="mft"><button class="btn scancel" onclick="cF()">Cancel</button><button class="btn ssave" onclick="save()">💾 Save & Sync</button></div></div></div>

<div class="ov" id="vMdl"><div class="mdl"><div class="mhd"><h2>👁️ Details</h2><button class="cbtn" onclick="cV()">&times;</button></div><div class="mbd"><div class="vgrid" id="vC"></div></div><div class="mft"><button class="btn scancel" onclick="cV()">Close</button></div></div></div>

<div class="ov" id="pMdl"><div class="mdl" style="max-width:380px"><div class="mhd"><h2>👤 Profile</h2><button class="cbtn" onclick="cPr()">&times;</button></div><div class="mbd"><div id="profileContent"></div></div><div class="mft"><button class="btn scancel" onclick="cPr()">Close</button></div></div></div>

<script>
// ============ FIREBASE CONFIG (SAME AS LOGIN PAGE) ============
const firebaseConfig = {
    apiKey: "AIzaSyB0Fpv8IiqWnY0bw0fp8GcvWO090JJExXQ",
    authDomain: "farmer-db-efd15.firebaseapp.com",
    databaseURL: "https://farmer-db-efd15-default-rtdb.firebaseio.com",
    projectId: "farmer-db-efd15",
    storageBucket: "farmer-db-efd15.firebasestorage.app",
    messagingSenderId: "634119179681",
    appId: "1:634119179681:web:44194bd635aae04fbf0fe0",
    measurementId: "G-ZYF3D2T96D"
  };

let db=null, farmerRef=null, isCloud=false;
let currentUser=null, D=[], pg=1, PP=10;

// ============ INIT ============
function init(){
    // Check auth
    const session=localStorage.getItem('currentUser');
    if(!session){window.location.href='index.html';return;}
    currentUser=JSON.parse(session);
    document.getElementById('userName').textContent=currentUser.name;

    // Init Firebase
    try{
        if(firebaseConfig.apiKey!=="YOUR_API_KEY_HERE"){
            firebase.initializeApp(firebaseConfig);
            db=firebase.database();
            farmerRef=db.ref('farmerData/'+currentUser.mobile+'/farmers');

            // REAL-TIME LISTENER - data auto sync
            farmerRef.on('value',function(snap){
                isCloud=true;
                D=[];
                if(snap.exists()){
                    snap.forEach(function(child){
                        const f=child.val();
                        f._key=child.key;
                        D.push(f);
                    });
                }
                // Local backup
                localStorage.setItem('farmers_'+currentUser.mobile,JSON.stringify(D));
                updateSync('on');
                render();
            });

            db.ref('.info/connected').on('value',function(snap){
                isCloud=snap.val()===true;
                updateSync(isCloud?'on':'off');
            });
        } else {
            loadLocal();
            updateSync('demo');
            render();
        }
    }catch(e){
        console.error(e);
        loadLocal();
        updateSync('off');
        render();
    }

    // Modal handlers
    ['fMdl','vMdl','pMdl'].forEach(id=>{
        document.getElementById(id).addEventListener('click',function(e){
            if(e.target===this) this.classList.remove('on');
        });
    });
    document.addEventListener('keydown',function(e){if(e.key==='Escape'){cF();cV();cPr();}});
}

function loadLocal(){
    try{D=JSON.parse(localStorage.getItem('farmers_'+currentUser.mobile)||'[]');}catch(e){D=[];}
}

function updateSync(s){
    const el=document.getElementById('syncBadge');
    if(s==='on'){el.className='sync-badge sync-on';el.textContent='☁️ Cloud Synced';}
    else if(s==='off'){el.className='sync-badge sync-off';el.textContent='📴 Offline';}
    else{el.className='sync-badge sync-off';el.textContent='📌 Local Mode';}
}

function logout(){if(confirm('🚪 Logout?')){localStorage.removeItem('currentUser');window.location.href='index.html';}}

function showProfile(){
    document.getElementById('profileContent').innerHTML=`<div class="profile-card"><div class="profile-avatar">👤</div><h3>${currentUser.name}</h3><p>📱 ${currentUser.mobile}</p><p>🏢 ${currentUser.org||'N/A'}</p><p style="font-size:0.72rem;color:#aaa;margin-top:6px">🔑 Login: ${currentUser.loginTime}</p><div style="display:flex;justify-content:center;gap:15px;margin-top:12px"><div><div style="font-size:1.2rem;font-weight:bold;color:#4CAF50">${D.length}</div><div style="font-size:0.65rem;color:#888">Total</div></div><div><div style="font-size:1.2rem;font-weight:bold;color:#2e7d32">${D.filter(f=>f.s==='Active').length}</div><div style="font-size:0.65rem;color:#888">Active</div></div></div></div>`;
    document.getElementById('pMdl').classList.add('on');
}
function cPr(){document.getElementById('pMdl').classList.remove('on');}

// ============ RENDER ============
function fmtA(inp){let v=inp.value.replace(/\D/g,'');if(v.length>12)v=v.substring(0,12);let f='';for(let i=0;i<v.length;i++){if(i>0&&i%4===0)f+='-';f+=v[i];}inp.value=f;}

function stats(){
    document.getElementById('sT').textContent=D.length;
    document.getElementById('sA').textContent=D.filter(f=>f.s==='Active').length;
    document.getElementById('sI').textContent=D.filter(f=>f.s==='Inactive').length;
    document.getElementById('sP').textContent=D.filter(f=>f.s==='Pending').length;
}

function render(){
    const s=document.getElementById('search').value.toLowerCase();
    const sf=document.getElementById('filter').value;
    let F=D.filter(f=>{
        const ms=!s||f.n.toLowerCase().includes(s)||f.c.toLowerCase().includes(s)||f.a.includes(s)||f.m.includes(s)||(f.b||'').toLowerCase().includes(s);
        return ms&&(sf==='all'||f.s===sf);
    });
    const tp=Math.ceil(F.length/PP)||1;
    if(pg>tp)pg=1;
    const st=(pg-1)*PP,pd=F.slice(st,st+PP);
    const tb=document.getElementById('tb');
    if(F.length===0){tb.innerHTML=`<tr><td colspan="12"><div class="nodata"><span>🌾</span><p>No farmers found!</p></div></td></tr>`;document.getElementById('pgn').innerHTML='';stats();return;}

    tb.innerHTML=pd.map((f,i)=>{
        const gi=D.indexOf(f);
        const bc=f.s==='Active'?'b1':f.s==='Inactive'?'b2':'b3';
        return `<tr><td><b>${st+i+1}</b></td><td><b style="color:#0a3d1f">${f.c}</b></td><td>${f.n}</td><td>${f.a}</td><td title="${f.ad}">${(f.ad||'').length>18?(f.ad||'').substring(0,18)+'...':f.ad||''}</td><td>${f.b}</td><td>${f.ac}</td><td><code>${f.if}</code></td><td>${f.br||'-'}</td><td><a href="tel:${f.m}">📞${f.m}</a></td><td><span class="bdg ${bc}">${f.s}</span></td><td><div class="acts"><button class="btn sm sv" onclick="vw(${gi})">👁️</button><button class="btn sm sed" onclick="ed(${gi})">✏️</button><button class="btn sm sdl" onclick="dl(${gi})">🗑️</button></div></td></tr>`;
    }).join('');

    let ph='';
    if(tp>1){ph+=`<button onclick="gP(${pg-1})" ${pg===1?'disabled':''}>◀</button>`;for(let i=1;i<=tp;i++)ph+=`<button onclick="gP(${i})" class="${i===pg?'act':''}">${i}</button>`;ph+=`<button onclick="gP(${pg+1})" ${pg===tp?'disabled':''}>▶</button>`;}
    document.getElementById('pgn').innerHTML=ph;
    stats();
}
function gP(p){pg=p;render();}

// ============ CRUD ============
function openAdd(){
    document.getElementById('mT').textContent='➕ Add Farmer';
    document.getElementById('eI').value=-1;clr();
    let mx=0;D.forEach(f=>{const n=parseInt(f.c.replace(/\D/g,''));if(n>mx)mx=n;});
    document.getElementById('i1').value='FR-'+String(mx+1).padStart(3,'0');
    document.getElementById('fMdl').classList.add('on');
}
function cF(){document.getElementById('fMdl').classList.remove('on');}
function cV(){document.getElementById('vMdl').classList.remove('on');}
function clr(){['i1','i2','i3','i4','i5','i6','i7','i8','i9'].forEach(id=>document.getElementById(id).value='');document.getElementById('i10').value='Active';}

function val(){
    const r=[{id:'i1',n:'Code'},{id:'i2',n:'Name'},{id:'i3',n:'Aadhar'},{id:'i4',n:'Mobile'},{id:'i5',n:'Address'},{id:'i6',n:'Bank'},{id:'i7',n:'A/C'},{id:'i8',n:'IFSC'}];
    for(let f of r){if(!document.getElementById(f.id).value.trim()){toast('❌ '+f.n+' required!','e');document.getElementById(f.id).focus();return false;}}
    if(document.getElementById('i3').value.replace(/\D/g,'').length!==12){toast('❌ Aadhar: 12 digits!','e');return false;}
    if(!/^\d{10}$/.test(document.getElementById('i4').value.trim())){toast('❌ Mobile: 10 digits!','e');return false;}
    return true;
}

async function save(){
    if(!val())return;
    const d={c:document.getElementById('i1').value.trim(),n:document.getElementById('i2').value.trim(),a:document.getElementById('i3').value.trim(),m:document.getElementById('i4').value.trim(),ad:document.getElementById('i5').value.trim(),b:document.getElementById('i6').value.trim(),ac:document.getElementById('i7').value.trim(),if:document.getElementById('i8').value.trim().toUpperCase(),br:document.getElementById('i9').value.trim(),s:document.getElementById('i10').value,du:new Date().toLocaleString('en-IN')};
    const idx=parseInt(document.getElementById('eI').value);

    try{
        if(idx===-1){
            if(D.find(f=>f.c===d.c)){toast('❌ Code exists!','e');return;}
            d.da=d.du;
            if(isCloud&&farmerRef){
                await farmerRef.push(d);
                toast('✅ Added & synced to cloud!','s');
            }else{
                D.push(d);
                localStorage.setItem('farmers_'+currentUser.mobile,JSON.stringify(D));
                render();
                toast('✅ Added (local)!','s');
            }
        }else{
            d.da=D[idx].da||d.du;
            if(isCloud&&farmerRef&&D[idx]._key){
                await farmerRef.child(D[idx]._key).set(d);
                toast('✅ Updated & synced!','s');
            }else{
                D[idx]=d;
                localStorage.setItem('farmers_'+currentUser.mobile,JSON.stringify(D));
                render();
                toast('✅ Updated (local)!','s');
            }
        }
    }catch(e){
        if(idx===-1){d.da=d.du;D.push(d);}else{d.da=D[idx].da;D[idx]=d;}
        localStorage.setItem('farmers_'+currentUser.mobile,JSON.stringify(D));
        render();
        toast('⚠️ Saved offline','w');
    }
    cF();
}

function vw(i){
    const f=D[i];const bc=f.s==='Active'?'b1':f.s==='Inactive'?'b2':'b3';
    document.getElementById('vC').innerHTML=`<div class="vi"><label>Code</label><p>${f.c}</p></div><div class="vi"><label>Name</label><p>${f.n}</p></div><div class="vi"><label>Aadhar</label><p>${f.a}</p></div><div class="vi"><label>Mobile</label><p>📞${f.m}</p></div><div class="vi fw"><label>Address</label><p>${f.ad}</p></div><div class="vi"><label>Bank</label><p>🏦${f.b}</p></div><div class="vi"><label>A/C</label><p>${f.ac}</p></div><div class="vi"><label>IFSC</label><p><code>${f.if}</code></p></div><div class="vi"><label>Branch</label><p>${f.br||'N/A'}</p></div><div class="vi"><label>Status</label><p><span class="bdg ${bc}">${f.s}</span></p></div><div class="vi"><label>Added</label><p>${f.da||'N/A'}</p></div><div class="vi"><label>Updated</label><p>${f.du||'N/A'}</p></div>`;
    document.getElementById('vMdl').classList.add('on');
}

function ed(i){
    const f=D[i];document.getElementById('mT').textContent='✏️ Edit';document.getElementById('eI').value=i;
    document.getElementById('i1').value=f.c;document.getElementById('i2').value=f.n;document.getElementById('i3').value=f.a;document.getElementById('i4').value=f.m;document.getElementById('i5').value=f.ad;document.getElementById('i6').value=f.b;document.getElementById('i7').value=f.ac;document.getElementById('i8').value=f.if;document.getElementById('i9').value=f.br||'';document.getElementById('i10').value=f.s;
    document.getElementById('fMdl').classList.add('on');
}

async function dl(i){
    if(!confirm(`⚠️ Delete "${D[i].n}"?`))return;
    try{
        if(isCloud&&farmerRef&&D[i]._key){await farmerRef.child(D[i]._key).remove();toast('🗑️ Deleted & synced!','s');}
        else{D.splice(i,1);localStorage.setItem('farmers_'+currentUser.mobile,JSON.stringify(D));render();toast('🗑️ Deleted!','s');}
    }catch(e){D.splice(i,1);localStorage.setItem('farmers_'+currentUser.mobile,JSON.stringify(D));render();toast('🗑️ Deleted (local)','s');}
}

// ============ EXPORT ============
function exportCSV(){
    if(!D.length){toast('❌ No data!','e');return;}
    const h=['S.No.','Code','Name','Aadhar','Address','Bank','A/C','IFSC','Branch','Mobile','Status','Added','Updated'];
    let csv='\uFEFF'+h.join(',')+'\n';
    D.forEach((f,i)=>{csv+=[i+1,q(f.c),q(f.n),q(f.a),q(f.ad),q(f.b),q(f.ac),q(f.if),q(f.br),q(f.m),q(f.s),q(f.da||''),q(f.du||'')].join(',')+'\n';});
    dlF(csv,`Farmers_${currentUser.name}_${gD()}.csv`,'text/csv;charset=utf-8');
    toast('📗 Excel exported!','s');
}
function q(v){return '"'+String(v||'').replace(/"/g,'""')+'"';}
function gD(){return new Date().toISOString().slice(0,10);}
function dlF(c,n,t){const b=new Blob([c],{type:t}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=n;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);}

function backup(){
    if(!D.length){toast('❌ No data!','e');return;}
    dlF(JSON.stringify({user:currentUser.name,mobile:currentUser.mobile,date:new Date().toLocaleString('en-IN'),count:D.length,data:D},null,2),`Backup_${currentUser.name}_${gD()}.json`,'application/json');
    toast('💾 Backup saved!','s');
}

function restore(){
    const inp=document.createElement('input');inp.type='file';inp.accept='.json';
    inp.onchange=function(e){
        const f=e.target.files[0];if(!f)return;
        const r=new FileReader();
        r.onload=async function(ev){
            try{
                const data=JSON.parse(ev.target.result);
                if(data.data&&Array.isArray(data.data)){
                    if(!confirm(`Replace ${D.length} farmers with ${data.data.length} from backup?`))return;
                    if(isCloud&&farmerRef){
                        await farmerRef.remove();
                        for(const farmer of data.data){
                            const clean={...farmer};delete clean._key;
                            await farmerRef.push(clean);
                        }
                        toast(`✅ Restored ${data.data.length} to cloud!`,'s');
                    }else{
                        D=data.data;
                        localStorage.setItem('farmers_'+currentUser.mobile,JSON.stringify(D));
                        render();
                        toast(`✅ Restored ${D.length}!`,'s');
                    }
                }
            }catch(er){toast('❌ Error!','e');}
        };r.readAsText(f);
    };inp.click();
}

function toast(m,t){const e=document.createElement('div');e.className='toast '+(t==='s'?'ts':t==='e'?'te':'tw');e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),3500);}

// Auto save local every 30s
setInterval(()=>{if(D.length>0)localStorage.setItem('farmers_'+currentUser.mobile,JSON.stringify(D));},30000);

init();
</script>
